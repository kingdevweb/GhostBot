<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>GhostBot — Connexion</title>
  <style>
    :root {
      --bg:     #060810;
      --card:   #0d1117;
      --border: #1e2d45;
      --accent: #00d4ff;
      --green:  #00ff88;
      --red:    #ff4757;
      --text:   #e8edf5;
      --muted:  #6b7a99;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Segoe UI',-apple-system,sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .box {
      background:var(--card); border:1px solid var(--border);
      border-radius:18px; padding:36px 28px; width:100%; max-width:380px;
      text-align:center; box-shadow:0 0 40px rgba(0,212,255,.08);
    }
    .logo { font-size:52px; margin-bottom:8px; }
    h1 { font-size:22px; font-weight:800; margin-bottom:4px;
         background:linear-gradient(135deg,#fff,var(--accent));
         -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .sub { font-size:11px; color:var(--muted); letter-spacing:.15em;
           text-transform:uppercase; margin-bottom:28px; }
    label { display:block; text-align:left; font-size:11px; font-weight:700;
            color:var(--muted); text-transform:uppercase; letter-spacing:.06em;
            margin-bottom:6px; }
    input {
      width:100%; padding:12px 14px; border-radius:10px;
      border:1.5px solid var(--border); background:#0a0f18;
      color:var(--text); font-size:14px; outline:none;
      transition:border .2s; margin-bottom:16px;
    }
    input:focus { border-color:var(--accent); }
    .btn {
      width:100%; padding:13px; border-radius:10px; border:none;
      background:linear-gradient(135deg,#0088cc,var(--accent));
      color:#000; font-size:15px; font-weight:800; cursor:pointer;
      transition:all .2s; margin-top:4px;
    }
    .btn:hover { opacity:.88; transform:translateY(-1px); }
    .btn:disabled { opacity:.4; cursor:default; transform:none; }
    .err {
      background:rgba(255,71,87,.1); border:1px solid rgba(255,71,87,.3);
      color:var(--red); padding:10px 14px; border-radius:8px;
      font-size:12px; margin-bottom:14px; display:none;
    }
    .footer { margin-top:22px; font-size:10px; color:var(--muted); }
    .footer span { color:var(--accent); }
  </style>
</head>
<body>
<div class="box">
  <img src="/ghostbot.png" style="width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 24px rgba(0,212,255,.4);object-fit:cover;margin-bottom:10px" onerror="this.outerHTML='<div class=\'logo\'>👻</div>'" alt="GhostBot"/>
  <h1>GhostBot</h1>
  <div class="sub">Admin Panel · KING DEV WEB</div>

  <form id="form" onsubmit="doLogin(event)">
    <div id="err" class="err"></div>

    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email"/>

    <label>Mot de Passe</label>
    <input type="password" id="pass" placeholder="••••••••" required autocomplete="current-password"/>

    <button class="btn" type="submit" id="btn">🔐 Konekte</button>
  </form>

  <div class="footer">Aksè Rezève · <span>KING DEV WEB</span></div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn');
  const errEl = document.getElementById('err');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;

  btn.disabled = true; btn.textContent = '⏳ K ap konekte…';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass }),
    });
    const d = await r.json();
    if (d.ok) {
      window.location.href = '/dashboard';
    } else {
      errEl.textContent = d.msg || '❌ Email oswa modpas pa kòrèk';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = '🔐 Konekte';
    }
  } catch(err) {
    errEl.textContent = '❌ Erè: ' + err.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '🔐 Konekte';
  }
}
</script>
</body>
</html>
